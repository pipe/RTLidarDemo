<html>
    <body>
        <H1> Hello Lidar</H1>
        <div id="status"></div>
        <div id="error"></div>
        <input id="action" type="button" onclick="nect();" value="Loading..."/>
        <p>This is the Lidar receiver</p>

        <canvas id="cloud" width="800" height="800"></canvas>
        <script>
            const CONFIG = {
                iceServers: [{urls: "stun:stun.l.google.com:19302"}],

                maxPacketSize: 1200
            };

            // TextEncoder/Decoder
            const textEncoder = new TextEncoder();
            const textDecoder = new TextDecoder();

            // Transport
            let transport;
            let connected = false;

            let candidates = [];

            function nect() {
                if (!connected) {
                    let myuuid = crypto.randomUUID();

                    if (candidates.length > 0) {
                        doOA(myuuid);
                    }
                } else {
                    document.location = document.location;
                }
            }

            function doOA(sessionId) {
                const negotiationData = {
                    "dtls": {
                        fingerprintDigestAlgorithm: transport.fingerprintDigestAlgorithm,
                        fingerprint: Array.from(new Uint8Array(transport.fingerprint))
                    },
                    candidates: candidates,
                    "sessionId": sessionId
                };
                let offer = JSON.stringify(negotiationData);
                console.log("offer is " + offer);
                let url = "/";
                console.log(`planning to post to ${url}`);
                let headers = new Headers();
                headers.append('Accept', 'application/json');
                fetch(url, {
                    method: 'POST',
                    headers: headers,
                    redirect: 'follow',
                    body: offer
                }).then(response => response.json())
                        .then((so) => {
                            console.log(JSON.stringify(so));
                            answerDeal(so,sessionId);
                        })
                        .catch(error => console.log('error', error));
            }

            async function getConfig() {
                console.log("get config");
                let headers = new Headers();
                headers.append('Accept', 'application/json');
                let response = await fetch("pipeconfig.json", {
                    method: 'GET',
                    headers: headers,
                    redirect: 'follow'
                });
                return response.json();
            }

            function eoc() {
                console.log("end of candidates")
            }
            /**
             * Initializes the RtcTransport instance.
             */
            async function initializeTransport() {

                let jconfig = await getConfig();
                console.log(JSON.stringify(jconfig));
                CONFIG.iceServers = jconfig.ice.iceServers;

                transport = createTransport("myTransport1", false);

                transport.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log(JSON.stringify(event.candidate));

                        if ((event.candidate.type !== "relay")) {
                            candidates.push(event.candidate);
                        }
                        if (candidates.length > 0) {
                            document.getElementById("action").value = "Connect";
                        }
                    }
                };

                const dtlsParameters = {
                    fingerprintDigestAlgorithm: transport.fingerprintDigestAlgorithm,
                    fingerprint: Array.from(new Uint8Array(transport.fingerprint)),
                };


            }

            /**
             * Sets up the event listeners for the UI elements.
             */
            function answerDeal(remoteData,sessionId) {
                console.log("deal with the answer :" + JSON.stringify(remoteData));
                if (sessionId === remoteData.sessionId){
                try {
                    let dtls, candidates;

                    dtls = remoteData.dtls;
                            dtls.sslRole = "client";
                            candidates = remoteData.candidates;
                            pollWritable(transport, "transport", () => {
                                console.log("we have a writeable transport");
                                document.getElementById("action").value = "Disconnect";
                                connected = true;
                            });
                            pollReceivedPackets(transport, (packets) => {
                                packets.forEach((packet) => {
                                    const buffer = new ArrayBuffer(packet.payloadByteLength);
                                    packet.copyPayloadTo(buffer);
                                    parseMessage(buffer);
                                    //parseMessage(packet.data);
                                });
                            });

                            dtls.fingerprint = new Uint8Array(dtls.fingerprint).buffer;
                            transport.setRemoteDtlsParameters(dtls);
                            candidates.forEach(candidate => transport.addRemoteCandidate(candidate));
                            updateStatus(`Added remote parameters`);
                        } catch (error) {
                            updateStatus("Error parsing candidate. Please check the format.");
                            console.error("Error parsing candidate:", error);
                        }
                    } else {
                        console.log("wrong session id" + sessionId + "!=" + remoteData.sessionId);
                    }
                }
// DOM Elements
            const statusEl = document.getElementById("status");
            const errorEl = document.getElementById("error");

            /**
             * Updates the status element with a new message.
             * @param {string} message - The message to display.
             */
            function updateStatus(message) {
                statusEl.innerText += message + "\n";
            }

            /**
             * Updates the error element with a new message.
             * @param {string} message - The message to display.
             */
            function updateError(message) {
                errorEl.innerText += message + "\n";
            }

            /**
             * Sends an ICE candidate to the peer transport.
             * @param {RtcTransport} peerTransport - The peer transport.
             * @param {string} peerTransportName - The name of the peer transport.
             * @param {Event} event - The ICE candidate event.
             */
            function sendCandidateToPeer(peerTransport, peerTransportName, event) {
                if (event.candidate) {
                    console.log(`Setting candidate to ${peerTransportName}:`, event.candidate);
                    peerTransport.addRemoteCandidate(event.candidate);
                    updateStatus(`Set candidate to ${peerTransportName}`);
                }
            }

            /**
             * Polls a transport until it becomes writable.
             * @param {RtcTransport} transport - The transport to poll.
             * @param {string} transportName - The name of the transport.
             * @param {HTMLButtonElement} sendButton - The send button associated with the transport.
             */
            async function pollWritable(transport, transportName, callback) {
                while (!await transport.writable()) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                updateStatus(`${transportName} is now writable`);
                if (callback) {
                    callback();
                }
            }

            /**
             * Polls a transport for received packets.
             * @param {RtcTransport} transport - The transport to poll.
             */
            async function pollReceivedPackets(transport, callback) {
                while (true) {
                    const packets = transport.getReceivedPackets();
                    if (packets.length > 0) {
                        callback(packets);
                    }
                    await new Promise(resolve => setTimeout(resolve, 10));
                }
            }

            /**
             * Creates and configures an RtcTransport instance.
             * @param {string} name - The name of the transport.
             * @param {boolean} isControlling - Whether the transport is controlling.
             * @returns {RtcTransport} The configured RtcTransport instance.
             */
            function createTransport(name, isControlling) {
                return new RtcTransport({
                    name,
                    iceServers: CONFIG.iceServers,
                    iceControlling: isControlling,
                    wireProtocol: 'dtls'
                });
            }
            /**
             * Initializes the application.
             */

            async function main() {
                if (!window['RtcTransport']) {
                    updateError("RtcTransport not supported on this browser. Be sure to run a recent Chromium Canary with --enable-blink-features=RTCRtpTransport.");
                    return;
                }
                initializeTransport();
                canvas = document.getElementById("cloud");
                drawme();
            }

            main();


            /* lidar stuff */

            let minAz = 45;
            let maxAz = 315;

            function drawme() {
                const ctx = canvas.getContext("2d");
                //ctx.rotate(Math.PI/2.0);
                const w = canvas.width;
                const h = canvas.height;
                const halfx = w / 2;
                const halfy = h / 2;

                ctx.beginPath();
                const x = halfx;
                const y = halfy;
                let startAngle = Math.PI / 2.0; // Starting point on circle
                let endAngle = startAngle + Math.PI * 2; // End point on circle
                let radius = 10;
                const counterclockwise = false; // clockwise or counterclockwise
                ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
                ctx.fillStyle = `rgb(255, 0, 0)`
                ctx.fill();
                ctx.beginPath();
                let a1 = startAngle + ((Math.PI * 2 * 45) / 360); // Starting point on circle
                let a2 = startAngle + ((Math.PI * 2 * 315) / 360); // End point on circle
                ctx.arc(x, y, halfx - 1, a1, a2, counterclockwise);
                ctx.strokeStyle = '#FF0000';
                ctx.stroke();
            }

            function draw(cloudlet) {
                const ctx = canvas.getContext("2d");
                const w = canvas.width;
                const h = canvas.height;
                let startAngle = Math.PI / 2.0; // Starting point on circle

                const halfx = w / 2;
                const halfy = h / 2;
                const counterclockwise = false; // clockwise or counterclockwise

                /*if (cloudlet.azimuth == 0){
                 ctx.clearRect(0, 0, w, h);
                 }*/
                let az = cloudlet.azimuth;

                if ((az >= minAz - 4) && (az <= maxAz + 4)) {

                    // erasure path
                    ctx.beginPath();
                    ctx.moveTo(halfx, halfy);
                    let a1 = startAngle + ((Math.PI * 2 * minAz) / 360.0);
                    let b1 = startAngle + ((Math.PI * 2 * maxAz) / 360.0);
                    let ax = halfx + halfx * Math.cos(a1);
                    let ay = halfy + halfy * Math.sin(a1);
                    let bx = halfx + halfx * Math.cos(b1);
                    let by = halfy + halfy * Math.sin(b1);
                    ctx.lineTo(ax, ay);
                    ctx.arc(halfx, halfy, halfx, a1, b1, true);
                    ctx.lineTo(halfx, halfy);
                    ctx.fillStyle = `rgb(200, 200, 225)`;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(halfx, halfy);
                    b1 = startAngle + ((Math.PI * 2 * az) / 360.0);
                    a1 = startAngle + ((Math.PI * 2 * (az + 4.0)) / 360.0);
                    ax = halfx + halfx * Math.cos(a1);
                    ay = halfy + halfy * Math.sin(a1);
                    bx = halfx + halfx * Math.cos(b1);
                    by = halfy + halfy * Math.sin(b1);
                    ctx.lineTo(ax, ay);
                    ctx.lineTo(bx, by);
                    ctx.lineTo(halfx, halfy);

                    ctx.fillStyle = `rgb(200, 200, 200)`;
                    ctx.fill();



                    cloudlet.data.forEach((pt) => {
                        ctx.beginPath();
                        let radius = (pt[0] / 120.0) * halfy;
                        if (radius < 0.0) {
                            radius = radius * -1.0;
                        }
                        const x = halfx; // x coordinate
                        const y = halfy; // y coordinate
                        const a1 = startAngle + ((Math.PI * 2 * az) / 360); // Starting point on circle
                        const a2 = startAngle + ((Math.PI * 2 * (az + .25)) / 360); // End point on circle
                        const counterclockwise = false; // clockwise or counterclockwise
                        ctx.arc(x, y, radius, a1, a2, counterclockwise);
                        let dark = Math.abs(pt[1]);
                        ctx.strokeStyle = `rgb(0, 0, 0)`;
                        ctx.lineWidth = '4';
                        ctx.stroke();
                        az += .25;
                    })
                }
                drawme();
            }

            function parseMessage(v) {
                let blocksize = 100;
                let blocksPerPacket = 12;
                let blocks = [];
                for (let i = 0; i < blocksPerPacket; i++) {
                    let offs = i * blocksize;
                    let block = v.slice(offs, offs + blocksize);
                    let blocko = parseBlock(block);
                    blocks.push(blocko);
                    draw(blocko);
                }
                //jsontest.send(JSON.stringify({blocks:blocks}));
            }

            function getUnsignedShort(b1, b2) {
                let ret = (b2 << 8) | b1;
                return ret;
            }

            function getSignedByte(b1) {
                let ret = 0x7f & b1;
                if (b1 & 0x80) {
                    ret -= 256;
                }
                return ret;
            }

            function parseBlock(block) {
                let subblocklen = 6;
                let head = new Uint8Array(block.slice(0, 4));
                let cloudlet = [];
                let timestamp = 0;
                let az = 0.0;
                if ((head[0] === 0xff) && (head[1] === 0xee)) {
                    let baz = getUnsignedShort(head[2], head[3]);
                    az = baz / 100.0;
                    let offs = 4;
                    for (let n = 0; n < 16; n++) {
                        let vblock = new Uint8Array(block.slice(offs, offs + subblocklen))
                        var d1 = getUnsignedShort(vblock[0], vblock[1]);
                        var rss1 = getSignedByte(vblock[2]);
                        var d2 = getUnsignedShort(vblock[3], vblock[4]);
                        var rss2 = getSignedByte(vblock[5]);
                        let d = (rss1 > rss2) ? d1 : d2;
                        let range = d / 100.0;
                        offs += subblocklen;
                        let pt = [range, Math.max(rss1, rss2)];
                        cloudlet[n] = pt;
                    }
                    let tsd = block.slice(offs, offs + 4);
                    let off = 3
                    while (off >= 0) {
                        timestamp = (timestamp << 8) | (tsd[off]);
                        off--;
                    }
                } else if ((head[0] === 0xff) && (head[1] === 0xff)) {
                    // skip this non-data.

                    console.log("invalid flags " + flags);
                }
                return {stamp: timestamp, data: cloudlet, azimuth: az};
            }

        </script>
